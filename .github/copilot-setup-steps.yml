# Copilot Coding Agent Setup Steps
# Configures the environment for GitHub Copilot coding agents (Claude, Codex)
# to work on issues and PRs in the gif-captcha repository.

name: "Copilot Setup Steps"

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: |
          echo "=== Running tests (node:test runner) ==="
          node --test tests/*.test.js 2>&1 || true
          echo ""
          echo "Note: Some pre-existing test failures are expected."
          echo "Agents should ensure their changes do not introduce NEW failures."

      - name: Run coverage check
        run: |
          npx c8 --reporter=text node --test tests/*.test.js 2>&1 || true

      - name: Validate HTML pages
        run: |
          npx htmlhint index.html demo.html analysis.html 2>&1 || true

      - name: Syntax-check all source files
        run: |
          echo "=== Syntax-checking src/ ==="
          for f in src/*.js; do
            node -c "$f" && echo "✓ $f" || echo "✗ $f FAILED"
          done
          echo ""
          echo "=== Syntax-checking bin/ ==="
          for f in bin/*.js; do
            node -c "$f" && echo "✓ $f" || echo "✗ $f FAILED"
          done

      - name: Project structure overview
        run: |
          echo "=== Source modules (src/) ==="
          ls -1 src/
          echo ""
          echo "=== Test files (tests/) ==="
          ls -1 tests/
          echo ""
          echo "=== Static HTML pages (root) ==="
          ls -1 *.html | head -20
          echo "... ($(ls -1 *.html | wc -l) total HTML pages)"
          echo ""
          echo "=== GitHub workflows ==="
          ls -1 .github/workflows/
          echo ""
          echo "=== package.json scripts ==="
          node -e "const p=require('./package.json');Object.entries(p.scripts).forEach(([k,v])=>console.log(k+': '+v))"

      - name: Verify Docker build
        run: |
          docker build -t gif-captcha-test . && echo "Docker build successful"
