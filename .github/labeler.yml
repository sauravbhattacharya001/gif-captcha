# Auto-labeler configuration for gif-captcha
# Automatically labels PRs and issues based on file paths and content

# Documentation changes
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'CONTRIBUTING.md'
          - 'LICENSE'
          - 'docs/**'
          - '*.md'

# GitHub configuration
github-config:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'

# CI/CD changes
ci-cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - 'Dockerfile'
          - 'docker-compose*.yml'
          - 'nginx*.conf'

# Test changes
tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'
          - '**/*.test.js'
          - '**/*.spec.js'

# Frontend / UI changes
frontend:
  - changed-files:
      - any-glob-to-any-file:
          - '*.html'
          - '*.css'
          - '*.js'

# Research content
research:
  - changed-files:
      - any-glob-to-any-file:
          - 'analysis.html'
          - 'demo.html'
          - 'index.html'

# Security-related changes
security:
  - changed-files:
      - any-glob-to-any-file:
          - 'nginx-security.conf'
          - '.github/workflows/codeql.yml'
          - '.github/dependabot.yml'

# Docker/Infrastructure
infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'docker-compose*.yml'
          - 'nginx*.conf'
          - '.github/workflows/docker.yml'

# Dependencies
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'package-lock.json'

# Core captcha engine
core:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/index.js'
          - 'src/crypto-utils.js'
          - 'src/shared-utils.js'
          - 'src/config-validator.js'

# Bot detection & anti-fraud
bot-detection:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/bot-signature-database.js'
          - 'src/fraud-ring-detector.js'
          - 'src/honeypot-injector.js'
          - 'src/solve-pattern-fingerprinter.js'
          - 'src/behavioral-biometrics.js'
          - 'src/captcha-replay-detector.js'
          - 'src/trust-score-engine.js'
          - 'src/session-risk-aggregator.js'
          - 'src/geo-risk-scorer.js'

# Analytics & monitoring
analytics:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/captcha-stats-collector.js'
          - 'src/captcha-health-monitor.js'
          - 'src/captcha-anomaly-detector.js'
          - 'src/solve-funnel-analyzer.js'
          - 'src/response-time-profiler.js'
          - 'src/captcha-traffic-analyzer.js'
          - 'src/captcha-audit-log.js'

# Challenge management
challenges:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/challenge-pool-manager.js'
          - 'src/challenge-rotation-scheduler.js'
          - 'src/challenge-template-engine.js'
          - 'src/challenge-decay-manager.js'
          - 'src/challenge-diversity-analyzer.js'
          - 'src/adaptive-difficulty-tuner.js'
          - 'src/captcha-strength-scorer.js'

# Operations & deployment
operations:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/captcha-capacity-planner.js'
          - 'src/captcha-load-tester.js'
          - 'src/captcha-canary-deployer.js'
          - 'src/captcha-rate-limiter.js'
          - 'src/captcha-incident-manager.js'
          - 'src/webhook-dispatcher.js'

# A/B testing & experiments
experimentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/ab-experiment-runner.js'
          - 'src/compliance-reporter.js'
          - 'src/captcha-fatigue-detector.js'

# Internationalization
i18n:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/i18n.js'
          - 'src/captcha-localization-manager.js'
