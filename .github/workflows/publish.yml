name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish-npm:
    name: Publish to npm Registry
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate version matches tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: |
          npm audit --omit=dev --audit-level=high || true
          # Fail on critical vulnerabilities in production deps
          npm audit --omit=dev --audit-level=critical

      - name: Run tests
        run: npm test

      - name: License compliance check
        run: |
          # Ensure no copyleft/problematic licenses in production deps
          npx license-checker --production --failOn \
            'GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;EUPL-1.1;EUPL-1.2;SSPL-1.0;BSL-1.0' \
            --summary || echo '::warning::Could not verify all dependency licenses'

      - name: Verify package contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          echo "### 📦 Package Contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/pack-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check package size
        run: |
          TARBALL=$(npm pack 2>/dev/null)
          SIZE=$(wc -c < "$TARBALL")
          SIZE_KB=$((SIZE / 1024))
          echo "Package size: ${SIZE_KB}KB"
          echo "### 📏 Package Size: ${SIZE_KB}KB" >> $GITHUB_STEP_SUMMARY
          rm -f "$TARBALL"
          # Warn if package exceeds 500KB
          if [ "$SIZE" -gt 512000 ]; then
            echo "::warning::Package is ${SIZE_KB}KB — consider reviewing included files"
          fi

      - name: Publish to npm (with provenance)
        if: github.event.inputs.dry-run != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish dry-run
        if: github.event.inputs.dry-run == 'true'
        run: |
          echo "::notice::Dry run — skipping actual publish"
          npm publish --access public --dry-run

      - name: Post-publish smoke test
        if: github.event.inputs.dry-run != 'true'
        run: |
          # Wait for npm registry propagation
          sleep 15
          PKG_VERSION=$(node -p "require('./package.json').version")
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"
          npm init -y > /dev/null 2>&1
          # Verify package is installable from registry
          for attempt in 1 2 3; do
            if npm install gif-captcha@"$PKG_VERSION" 2>/dev/null; then
              echo "✅ gif-captcha@$PKG_VERSION installed successfully (attempt $attempt)"
              break
            fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          # Verify main export resolves
          node -e "const m = require('gif-captcha'); console.log('✅ Module loaded, exports:', Object.keys(m).length, 'keys');"
          # Verify CLI entry point exists
          if [ -f node_modules/.bin/gif-captcha ]; then
            echo "✅ CLI binary registered"
          else
            echo "::warning::CLI binary not found in node_modules/.bin"
          fi
          # Cleanup
          cd /
          rm -rf "$TEMP_DIR"
          echo "### 🧪 Post-publish Smoke Test: PASSED" >> $GITHUB_STEP_SUMMARY

  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: publish-npm
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@sauravbhattacharya001"

      - name: Install dependencies
        run: npm ci

      - name: Scope package for GitHub Packages
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@sauravbhattacharya001/gif-captcha';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');
          "

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
