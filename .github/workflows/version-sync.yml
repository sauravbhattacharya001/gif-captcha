name: Version Sync

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync package.json version with release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Update package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Syncing package.json to version $VERSION (tag: $TAG)"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');
            console.log('Updated package.json version to', pkg.version);
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "Version already in sync"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            git commit -m "chore: bump package.json version to $VERSION [skip ci]"
            git push origin HEAD:master
          fi
